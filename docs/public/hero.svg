<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="40"/>
  <g transform="translate(60, 120)">
    <rect x="0" y="80" width="40" height="100" rx="6" fill="url(#bar1)" opacity="0.7"/>
    <rect x="50" y="40" width="40" height="140" rx="6" fill="url(#bar2)"/>
    <rect x="100" y="60" width="40" height="120" rx="6" fill="url(#bar3)" opacity="0.8"/>
    <rect x="150" y="20" width="40" height="160" rx="6" fill="url(#bar1)"/>
    <rect x="200" y="70" width="40" height="110" rx="6" fill="url(#bar2)" opacity="0.6"/>
    <rect x="250" y="30" width="40" height="150" rx="6" fill="url(#bar3)"/>
    <!-- 趋势线 -->
    <polyline points="20,120 70,95 120,105 170,70 220,100 270,75"
              fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(50, 30)">
    <text x="0" y="0" font-family="sans-serif" font-size="14" font-weight="600" fill="#dc2626">投资知识</text>
  </g>
</svg>
